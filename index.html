<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Office - 3D Isometric</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #2a2a3e; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        
        .ui-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(10, 14, 39, 0.95);
            border: 1px solid rgba(100, 181, 246, 0.3);
            border-radius: 15px;
            padding: 20px;
            color: #fff;
            z-index: 100;
            min-width: 260px;
        }
        .ui-panel h2 { font-size: 1.2em; margin-bottom: 15px; color: #64b5f6; }
        
        .agent-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 10px;
            margin: 8px 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .agent-card:hover { background: rgba(100, 181, 246, 0.2); border-color: #64b5f6; }
        .agent-card .name { font-weight: bold; }
        .agent-card .status { font-size: 0.85em; margin-top: 4px; }
        .agent-card .status.idle { color: #4caf50; }
        .agent-card .status.walking { color: #2196f3; }
        .agent-card .status.working { color: #ffc107; }
        
        .controls {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        .btn {
            background: linear-gradient(135deg, #64b5f6, #1565c0);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(100,181,246,0.4); }
        .btn-green { background: linear-gradient(135deg, #66bb6a, #2e7d32); }
        .btn-orange { background: linear-gradient(135deg, #ffa726, #e65100); }
        
        .info-bar {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(10, 14, 39, 0.95);
            border: 1px solid rgba(100, 181, 246, 0.3);
            border-radius: 15px;
            padding: 15px 20px;
            color: #fff;
            z-index: 100;
            text-align: center;
        }
        .info-bar .stat { margin: 5px 0; font-size: 0.9em; }
        .info-bar .stat span { color: #64b5f6; font-weight: bold; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="ui-panel">
        <h2>🤖 აგენტები</h2>
        <div id="agentList"></div>
    </div>
    
    <div class="info-bar">
        <div class="stat">აქტიური: <span id="statActive">0</span></div>
        <div class="stat">თავისუფალი: <span id="statIdle">0</span></div>
        <div class="stat">ამოცანები: <span id="statTasks">0</span></div>
    </div>
    
    <div class="controls">
        <button class="btn" onclick="assignRandomTask()">📋 ამოცანა</button>
        <button class="btn btn-green" onclick="makeAllWork()">⚡ ყველას მუშაობა</button>
        <button class="btn btn-orange" onclick="resetAgents()">🔄 რესტარტი</button>
    </div>

    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js?v=3.0"></script>
    <script>
        // ============================================
        // ვერსია 3.0 - ია ოთახი, სტატიკური კამერა
        // ============================================
        
        // სცენა
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2a2a3e);
        
        // კამერა - დაფიქსირებული isometric ხედით
        // პოზიცია: ზემოდან და გვერდიდან (45 გრადუსი)
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(12, 10, 12);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        // განათება
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        // იატაკი
        const floorGeo = new THREE.BoxGeometry(14, 0.2, 12);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0xd4a574 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.position.y = -0.1;
        floor.receiveShadow = true;
        scene.add(floor);
        
        // კედლები - მხოლოდ 3 კედელი (ღია ზემოდან და წინიდან)
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xf5f0e8 });
        
        // უკანა კედელი
        const backWall = new THREE.Mesh(new THREE.BoxGeometry(14, 4, 0.2), wallMat);
        backWall.position.set(0, 2, -6);
        backWall.receiveShadow = true;
        scene.add(backWall);
        
        // მარცხენა კედელი
        const leftWall = new THREE.Mesh(new THREE.BoxGeometry(0.2, 4, 12), wallMat);
        leftWall.position.set(-7, 2, 0);
        leftWall.receiveShadow = true;
        scene.add(leftWall);
        
        // მარჯვენა კედელი
        const rightWall = new THREE.Mesh(new THREE.BoxGeometry(0.2, 4, 12), wallMat);
        rightWall.position.set(7, 2, 0);
        rightWall.receiveShadow = true;
        scene.add(rightWall);
        
        // ხალიჩა
        const rug = new THREE.Mesh(new THREE.BoxGeometry(6, 0.05, 4), new THREE.MeshStandardMaterial({ color: 0xb8a88a }));
        rug.position.set(0, 0.02, 0);
        rug.receiveShadow = true;
        scene.add(rug);
        
        // მაგიდის შექმნა
        function createDesk(x, z) {
            const deskGroup = new THREE.Group();
            
            // მაგიდა
            const desk = new THREE.Mesh(
                new THREE.BoxGeometry(1.8, 0.08, 1),
                new THREE.MeshStandardMaterial({ color: 0xc4956a })
            );
            desk.position.y = 0.75;
            desk.castShadow = true;
            desk.receiveShadow = true;
            deskGroup.add(desk);
            
            // ფეხები
            const legMat = new THREE.MeshStandardMaterial({ color: 0x8b7355 });
            const legGeo = new THREE.BoxGeometry(0.08, 0.75, 0.08);
            [[-0.8, 0.375, -0.4], [0.8, 0.375, -0.4], [-0.8, 0.375, 0.4], [0.8, 0.375, 0.4]].forEach(pos => {
                const leg = new THREE.Mesh(legGeo, legMat);
                leg.position.set(...pos);
                leg.castShadow = true;
                deskGroup.add(leg);
            });
            
            // მონიტორი
            const monitor = new THREE.Mesh(
                new THREE.BoxGeometry(0.8, 0.5, 0.05),
                new THREE.MeshStandardMaterial({ color: 0x222222 })
            );
            monitor.position.set(0, 1.1, -0.3);
            monitor.castShadow = true;
            deskGroup.add(monitor);
            
            // ეკრანი
            const screen = new THREE.Mesh(
                new THREE.BoxGeometry(0.72, 0.42, 0.02),
                new THREE.MeshStandardMaterial({ color: 0x4488ff, emissive: 0x4488ff, emissiveIntensity: 0.3 })
            );
            screen.position.set(0, 1.1, -0.28);
            deskGroup.add(screen);
            
            // კლავიატურა
            const kb = new THREE.Mesh(
                new THREE.BoxGeometry(0.5, 0.03, 0.2),
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );
            kb.position.set(0, 0.81, 0.1);
            deskGroup.add(kb);
            
            // მცენარე
            const pot = new THREE.Mesh(
                new THREE.CylinderGeometry(0.08, 0.06, 0.12, 16),
                new THREE.MeshStandardMaterial({ color: 0x8b4513 })
            );
            pot.position.set(0.6, 0.85, -0.3);
            deskGroup.add(pot);
            
            const plant = new THREE.Mesh(
                new THREE.SphereGeometry(0.15, 8, 8),
                new THREE.MeshStandardMaterial({ color: 0x4caf50 })
            );
            plant.position.set(0.6, 1.02, -0.3);
            deskGroup.add(plant);
            
            // სკამი
            const seat = new THREE.Mesh(
                new THREE.BoxGeometry(0.5, 0.08, 0.5),
                new THREE.MeshStandardMaterial({ color: 0x555555 })
            );
            seat.position.set(0, 0.5, 0.65);
            seat.castShadow = true;
            deskGroup.add(seat);
            
            const back = new THREE.Mesh(
                new THREE.BoxGeometry(0.5, 0.45, 0.08),
                new THREE.MeshStandardMaterial({ color: 0x555555 })
            );
            back.position.set(0, 0.75, 0.85);
            back.castShadow = true;
            deskGroup.add(back);
            
            const seatLeg = new THREE.Mesh(
                new THREE.CylinderGeometry(0.04, 0.04, 0.5),
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );
            seatLeg.position.set(0, 0.25, 0.65);
            deskGroup.add(seatLeg);
            
            deskGroup.position.set(x, 0, z);
            return deskGroup;
        }
        
        // მაგიდები
        const desks = [];
        const deskPositions = [
            { x: -4, z: -3 },
            { x: 0, z: -3 },
            { x: 4, z: -3 },
            { x: -4, z: 2 },
            { x: 4, z: 2 }
        ];
        
        deskPositions.forEach((pos, i) => {
            const desk = createDesk(pos.x, pos.z);
            scene.add(desk);
            desks.push({ mesh: desk, position: new THREE.Vector3(pos.x, 0, pos.z), id: i });
        });
        
        // აგენტის შექმნა
        function createAgent(color, name) {
            const agentGroup = new THREE.Group();
            
            // სხეული
            const body = new THREE.Mesh(
                new THREE.CylinderGeometry(0.2, 0.2, 0.6, 16),
                new THREE.MeshStandardMaterial({ color: color })
            );
            body.position.y = 0.6;
            body.castShadow = true;
            agentGroup.add(body);
            
            // თავი
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.22, 16, 16),
                new THREE.MeshStandardMaterial({ color: color })
            );
            head.position.y = 1.15;
            head.castShadow = true;
            agentGroup.add(head);
            
            // თვალები
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 1 });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), eyeMat);
            leftEye.position.set(-0.08, 1.17, 0.18);
            agentGroup.add(leftEye);
            
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), eyeMat);
            rightEye.position.set(0.08, 1.17, 0.18);
            agentGroup.add(rightEye);
            
            agentGroup.userData = { name: name, color: color };
            return agentGroup;
        }
        
        // აგენტები
        const agents = [
            { name: 'კოპირაითერი 1', color: 0x9c27b0, state: 'idle', desk: null, mesh: null },
            { name: 'კოპირაითერი 2', color: 0x2196f3, state: 'idle', desk: null, mesh: null },
            { name: 'რედაქტორი', color: 0xff9800, state: 'idle', desk: null, mesh: null },
            { name: 'SEO სპეციალისტი', color: 0x4caf50, state: 'idle', desk: null, mesh: null }
        ];
        
        agents.forEach((agent, i) => {
            const mesh = createAgent(agent.color, agent.name);
            mesh.position.set(-4 + i * 1.2, 0, 4);
            scene.add(mesh);
            agent.mesh = mesh;
        });
        
        // ამოცანების სისტემა
        let taskCount = 0;
        
        function moveAgentToDesk(agent, desk) {
            agent.state = 'walking';
            agent.desk = desk;
            agent.targetX = desk.position.x;
            agent.targetZ = desk.position.z + 1;
        }
        
        function updateAgents() {
            agents.forEach(agent => {
                if (agent.state === 'walking') {
                    const dx = agent.targetX - agent.mesh.position.x;
                    const dz = agent.targetZ - agent.mesh.position.z;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    
                    if (dist < 0.1) {
                        agent.state = 'working';
                        agent.mesh.position.y = 0.3;
                        updateUI();
                    } else {
                        agent.mesh.position.x += (dx / dist) * 0.05;
                        agent.mesh.position.z += (dz / dist) * 0.05;
                        agent.mesh.rotation.y = Math.atan2(dx, dz);
                    }
                }
            });
        }
        
        function assignRandomTask() {
            const idleAgents = agents.filter(a => a.state === 'idle');
            const availableDesks = desks.filter(d => !agents.some(a => a.desk === d));
            
            if (idleAgents.length > 0 && availableDesks.length > 0) {
                const agent = idleAgents[0];
                const desk = availableDesks[0];
                moveAgentToDesk(agent, desk);
                taskCount++;
                updateUI();
            }
        }
        
        function makeAllWork() {
            agents.forEach(agent => {
                if (agent.state === 'idle') {
                    const availableDesks = desks.filter(d => !agents.some(a => a.desk === d));
                    if (availableDesks.length > 0) {
                        moveAgentToDesk(agent, availableDesks[0]);
                        taskCount++;
                    }
                }
            });
            updateUI();
        }
        
        function resetAgents() {
            agents.forEach((agent, i) => {
                agent.state = 'idle';
                agent.desk = null;
                agent.mesh.position.set(-4 + i * 1.2, 0, 4);
                agent.mesh.position.y = 0;
            });
            taskCount = 0;
            updateUI();
        }
        
        function updateUI() {
            const list = document.getElementById('agentList');
            list.innerHTML = '';
            
            const statusText = { 'idle': '🟢 თავისუფალი', 'walking': '🚶 მიდის', 'working': '💻 მუშაობს' };
            
            agents.forEach(agent => {
                const card = document.createElement('div');
                card.className = 'agent-card';
                const colorHex = agent.color.toString(16).padStart(6, '0');
                card.innerHTML = '<div class="name" style="color:#' + colorHex + '">' + agent.name + '</div>' +
                    '<div class="status ' + agent.state + '">' + statusText[agent.state] + '</div>';
                card.onclick = () => { if (agent.state === 'idle') assignRandomTask(); };
                list.appendChild(card);
            });
            
            document.getElementById('statActive').textContent = agents.filter(a => a.state === 'working').length;
            document.getElementById('statIdle').textContent = agents.filter(a => a.state === 'idle').length;
            document.getElementById('statTasks').textContent = taskCount;
        }
        
        // ანიმაცია - კამერა სტატიკურია!
        function animate() {
            requestAnimationFrame(animate);
            updateAgents();
            renderer.render(scene, camera);
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        updateUI();
        animate();
    </script>
</body>
</html>
