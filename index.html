<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Office - 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0e27; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 1.5em;
            z-index: 1000;
            text-align: center;
        }
        .loading.hidden { display: none; }
        
        .error-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(244, 67, 54, 0.95);
            color: #fff;
            padding: 30px;
            border-radius: 15px;
            font-size: 1.1em;
            z-index: 2000;
            max-width: 500px;
            text-align: center;
            display: none;
        }
        .error-message.show { display: block; }
        
        .ui-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(10, 14, 39, 0.92);
            border: 1px solid rgba(100, 181, 246, 0.3);
            border-radius: 15px;
            padding: 20px;
            color: #fff;
            z-index: 100;
            min-width: 260px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .ui-panel h2 {
            font-size: 1.1em;
            margin-bottom: 15px;
            color: #64b5f6;
        }
        .agent-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 10px 12px;
            margin: 6px 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .agent-card:hover {
            background: rgba(100, 181, 246, 0.15);
            border-color: #64b5f6;
            transform: translateX(3px);
        }
        .agent-card .name { font-weight: bold; font-size: 0.95em; }
        .agent-card .status { font-size: 0.8em; margin-top: 3px; }
        .agent-card .status.idle { color: #4caf50; }
        .agent-card .status.walking { color: #2196f3; }
        .agent-card .status.working { color: #ffc107; }
        
        .controls {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            background: linear-gradient(135deg, #64b5f6, #1565c0);
            color: #fff;
            border: none;
            padding: 12px 22px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(100,181,246,0.3);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(100,181,246,0.5); }
        .btn-green { background: linear-gradient(135deg, #66bb6a, #2e7d32); }
        .btn-orange { background: linear-gradient(135deg, #ffa726, #e65100); }
        
        .info-bar {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(10, 14, 39, 0.92);
            border: 1px solid rgba(100, 181, 246, 0.3);
            border-radius: 15px;
            padding: 15px 20px;
            color: #fff;
            z-index: 100;
            backdrop-filter: blur(10px);
            text-align: center;
        }
        .info-bar .stat { margin: 5px 0; font-size: 0.9em; }
        .info-bar .stat span { color: #64b5f6; font-weight: bold; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="loading" id="loading">იტვირთება 3D სცენა...</div>
    <div class="error-message" id="errorMessage"></div>
    
    <div class="ui-panel">
        <h2> აგენტები</h2>
        <div id="agentList"></div>
    </div>
    
    <div class="info-bar">
        <div class="stat">აქტიური: <span id="statActive">0</span></div>
        <div class="stat">თავისუფალი: <span id="statIdle">0</span></div>
        <div class="stat">ამოცანები: <span id="statTasks">0</span></div>
    </div>
    
    <div class="controls">
        <button class="btn" onclick="assignRandomTask()">📋 ამოცანის მინიჭება</button>
        <button class="btn btn-green" onclick="makeAllWork()"> ყველას მუშაობა</button>
        <button class="btn btn-orange" onclick="resetAgents()">🔄 რესტარტი</button>
    </div>

    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.innerHTML = '❌ შეცდომა:<br><br>' + msg + '<br><br>ხაზი: ' + lineNo;
            errorDiv.classList.add('show');
            document.getElementById('loading').classList.add('hidden');
            return false;
        };
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        if (typeof THREE === 'undefined') {
            document.getElementById('errorMessage').innerHTML = '❌ Three.js ვერ ჩაიტვირთა!';
            document.getElementById('errorMessage').classList.add('show');
            document.getElementById('loading').classList.add('hidden');
            throw new Error('Three.js not loaded');
        }
        console.log('✓ Three.js ჩაიტვირთა');
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 20, 50);
        
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(14, 12, 14);
        camera.lookAt(0, 1, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        // ტექსტურების შექმნა
        function createWoodTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#c4956a';
            ctx.fillRect(0, 0, 512, 512);
            for (let i = 0; i < 512; i += 8) {
                ctx.strokeStyle = 'rgba(139, 115, 85, ' + (0.3 + Math.random() * 0.4) + ')';
                ctx.lineWidth = 1 + Math.random() * 2;
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(512, i + (Math.random() - 0.5) * 10);
                ctx.stroke();
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }
        
        function createFloorTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#d4a574';
            ctx.fillRect(0, 0, 512, 512);
            for (let i = 0; i < 8; i++) {
                const y = i * 64;
                ctx.fillStyle = 'rgba(180, 140, 100, ' + (0.2 + Math.random() * 0.3) + ')';
                ctx.fillRect(0, y, 512, 2);
                for (let j = 0; j < 64; j += 4) {
                    ctx.strokeStyle = 'rgba(139, 115, 85, ' + (0.1 + Math.random() * 0.2) + ')';
                    ctx.beginPath();
                    ctx.moveTo(0, y + j);
                    ctx.lineTo(512, y + j + (Math.random() - 0.5) * 5);
                    ctx.stroke();
                }
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(3, 3);
            return texture;
        }
        
        function createWallTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#f5f0e8';
            ctx.fillRect(0, 0, 256, 256);
            for (let i = 0; i < 1000; i++) {
                ctx.fillStyle = 'rgba(200, 195, 185, ' + (Math.random() * 0.3) + ')';
                ctx.fillRect(Math.random() * 256, Math.random() * 256, 2, 2);
            }
            return new THREE.CanvasTexture(canvas);
        }
        
        function createRugTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#b8a88a';
            ctx.fillRect(0, 0, 256, 256);
            ctx.strokeStyle = 'rgba(160, 140, 110, 0.5)';
            ctx.lineWidth = 3;
            for (let i = 20; i < 256; i += 20) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, 256);
                ctx.stroke();
            }
            ctx.strokeStyle = 'rgba(120, 100, 70, 0.6)';
            ctx.lineWidth = 8;
            ctx.strokeRect(10, 10, 236, 236);
            return new THREE.CanvasTexture(canvas);
        }
        
        // განათება
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        
        const sunLight = new THREE.DirectionalLight(0xfff4e6, 1.0);
        sunLight.position.set(8, 12, 5);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.1;
        sunLight.shadow.camera.far = 50;
        sunLight.shadow.camera.left = -15;
        sunLight.shadow.camera.right = 15;
        sunLight.shadow.camera.top = 15;
        sunLight.shadow.camera.bottom = -15;
        scene.add(sunLight);
        
        const ceilingLight1 = new THREE.PointLight(0xfff0dd, 0.6, 15);
        ceilingLight1.position.set(-3, 4, -2);
        scene.add(ceilingLight1);
        
        const ceilingLight2 = new THREE.PointLight(0xfff0dd, 0.6, 15);
        ceilingLight2.position.set(3, 4, 2);
        scene.add(ceilingLight2);
        
        const windowLight = new THREE.SpotLight(0xfff8f0, 0.8, 20, Math.PI / 4, 0.5);
        windowLight.position.set(-8, 5, 0);
        windowLight.target.position.set(0, 0, 0);
        scene.add(windowLight);
        scene.add(windowLight.target);
        
        const woodTexture = createWoodTexture();
        const floorTexture = createFloorTexture();
        const wallTexture = createWallTexture();
        const rugTexture = createRugTexture();
        
        // ოთახის შექმნა
        function createRoom() {
            const roomGroup = new THREE.Group();
            
            const floor = new THREE.Mesh(
                new THREE.BoxGeometry(16, 0.3, 12),
                new THREE.MeshStandardMaterial({ map: floorTexture, roughness: 0.7, metalness: 0.1 })
            );
            floor.position.y = -0.15;
            floor.receiveShadow = true;
            roomGroup.add(floor);
            
            const wallMat = new THREE.MeshStandardMaterial({ map: wallTexture, roughness: 0.9 });
            
            const backWall = new THREE.Mesh(new THREE.BoxGeometry(16, 6, 0.3), wallMat);
            backWall.position.set(0, 3, -6);
            backWall.receiveShadow = true;
            roomGroup.add(backWall);
            
            const leftWall = new THREE.Mesh(new THREE.BoxGeometry(0.3, 6, 12), wallMat);
            leftWall.position.set(-8, 3, 0);
            leftWall.receiveShadow = true;
            roomGroup.add(leftWall);
            
            const windowFrame = new THREE.Mesh(
                new THREE.BoxGeometry(0.4, 3, 4),
                new THREE.MeshStandardMaterial({ color: 0xffffff })
            );
            windowFrame.position.set(-7.9, 3, -1);
            roomGroup.add(windowFrame);
            
            const windowGlass = new THREE.Mesh(
                new THREE.BoxGeometry(0.1, 2.8, 3.8),
                new THREE.MeshStandardMaterial({ color: 0x87ceeb, transparent: true, opacity: 0.3, roughness: 0.1 })
            );
            windowGlass.position.set(-7.85, 3, -1);
            roomGroup.add(windowGlass);
            
            const rightWall = new THREE.Mesh(new THREE.BoxGeometry(0.3, 6, 12), wallMat);
            rightWall.position.set(8, 3, 0);
            rightWall.receiveShadow = true;
            roomGroup.add(rightWall);
            
            const ceiling = new THREE.Mesh(
                new THREE.BoxGeometry(16, 0.2, 12),
                new THREE.MeshStandardMaterial({ color: 0xffffff })
            );
            ceiling.position.y = 6;
            roomGroup.add(ceiling);
            
            const rug = new THREE.Mesh(
                new THREE.BoxGeometry(7, 0.05, 5),
                new THREE.MeshStandardMaterial({ map: rugTexture })
            );
            rug.position.set(0, 0.02, 0);
            rug.receiveShadow = true;
            roomGroup.add(rug);
            
            return roomGroup;
        }
        
        // მაგიდის შექმნა
        function createDesk(x, z, rotation) {
            rotation = rotation || 0;
            const deskGroup = new THREE.Group();
            
            const top = new THREE.Mesh(
                new THREE.BoxGeometry(2.2, 0.08, 1.1),
                new THREE.MeshStandardMaterial({ map: woodTexture, roughness: 0.6 })
            );
            top.position.y = 0.75;
            top.castShadow = true;
            top.receiveShadow = true;
            deskGroup.add(top);
            
            const legMat = new THREE.MeshStandardMaterial({ color: 0x8b7355 });
            const legGeo = new THREE.BoxGeometry(0.08, 0.75, 0.08);
            var legPositions = [[-1, 0.375, -0.45], [1, 0.375, -0.45], [-1, 0.375, 0.45], [1, 0.375, 0.45]];
            legPositions.forEach(function(pos) {
                const leg = new THREE.Mesh(legGeo, legMat);
                leg.position.set(pos[0], pos[1], pos[2]);
                leg.castShadow = true;
                deskGroup.add(leg);
            });
            
            const monitorMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.3 });
            const monitor = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.55, 0.06), monitorMat);
            monitor.position.set(0, 1.1, -0.35);
            monitor.castShadow = true;
            deskGroup.add(monitor);
            
            const screen = new THREE.Mesh(
                new THREE.BoxGeometry(0.82, 0.47, 0.01),
                new THREE.MeshStandardMaterial({ color: 0x1a2a4a, emissive: 0x4488ff, emissiveIntensity: 0.4 })
            );
            screen.position.set(0, 1.1, -0.32);
            deskGroup.add(screen);
            
            const stand = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.3, 0.12), monitorMat);
            stand.position.set(0, 0.92, -0.35);
            deskGroup.add(stand);
            
            const kbMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const kb = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.03, 0.22), kbMat);
            kb.position.set(0, 0.81, 0.15);
            deskGroup.add(kb);
            
            const mouse = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.03, 0.12), kbMat);
            mouse.position.set(0.4, 0.81, 0.15);
            deskGroup.add(mouse);
            
            const mug = new THREE.Mesh(
                new THREE.CylinderGeometry(0.06, 0.05, 0.12, 16),
                new THREE.MeshStandardMaterial({ color: 0xffffff })
            );
            mug.position.set(-0.7, 0.85, 0.2);
            mug.castShadow = true;
            deskGroup.add(mug);
            
            const pot = new THREE.Mesh(
                new THREE.CylinderGeometry(0.1, 0.08, 0.15, 16),
                new THREE.MeshStandardMaterial({ color: 0x8b4513 })
            );
            pot.position.set(0.8, 0.87, -0.3);
            deskGroup.add(pot);
            
            const plant = new THREE.Mesh(
                new THREE.SphereGeometry(0.18, 8, 8),
                new THREE.MeshStandardMaterial({ color: 0x4caf50 })
            );
            plant.position.set(0.8, 1.08, -0.3);
            plant.castShadow = true;
            deskGroup.add(plant);
            
            const seatMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
            const seat = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.08, 0.55), seatMat);
            seat.position.set(0, 0.5, 0.7);
            seat.castShadow = true;
            deskGroup.add(seat);
            
            const back = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.5, 0.08), seatMat);
            back.position.set(0, 0.78, 0.95);
            back.castShadow = true;
            deskGroup.add(back);
            
            const seatLeg = new THREE.Mesh(
                new THREE.CylinderGeometry(0.04, 0.04, 0.5),
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );
            seatLeg.position.set(0, 0.25, 0.7);
            deskGroup.add(seatLeg);
            
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const wheelGeo = new THREE.SphereGeometry(0.04, 8, 8);
            var wheelPositions = [[-0.2, 0.04, 0.55], [0.2, 0.04, 0.55], [-0.2, 0.04, 0.85], [0.2, 0.04, 0.85], [0, 0.04, 0.7]];
            wheelPositions.forEach(function(pos) {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.position.set(pos[0], pos[1], pos[2]);
                deskGroup.add(wheel);
            });
            
            deskGroup.position.set(x, 0, z);
            deskGroup.rotation.y = rotation;
            return deskGroup;
        }
        
        // წიგნების თარო
        function createBookshelf(x, z) {
            const shelfGroup = new THREE.Group();
            const frameMat = new THREE.MeshStandardMaterial({ map: woodTexture, roughness: 0.7 });
            
            const sideGeo = new THREE.BoxGeometry(0.1, 2.5, 0.8);
            const leftSide = new THREE.Mesh(sideGeo, frameMat);
            leftSide.position.set(-0.5, 1.25, 0);
            leftSide.castShadow = true;
            shelfGroup.add(leftSide);
            
            const rightSide = new THREE.Mesh(sideGeo, frameMat);
            rightSide.position.set(0.5, 1.25, 0);
            rightSide.castShadow = true;
            shelfGroup.add(rightSide);
            
            const shelfGeo = new THREE.BoxGeometry(1.1, 0.05, 0.8);
            for (let i = 0; i < 5; i++) {
                const shelf = new THREE.Mesh(shelfGeo, frameMat);
                shelf.position.set(0, i * 0.6, 0);
                shelf.castShadow = true;
                shelf.receiveShadow = true;
                shelfGroup.add(shelf);
            }
            
            const bookColors = [0xc62828, 0x1565c0, 0x2e7d32, 0xf57f17, 0x6a1b9a, 0x00838f];
            for (let row = 0; row < 4; row++) {
                for (let i = 0; i < 6; i++) {
                    const book = new THREE.Mesh(
                        new THREE.BoxGeometry(0.08, 0.4 + Math.random() * 0.15, 0.5),
                        new THREE.MeshStandardMaterial({ color: bookColors[Math.floor(Math.random() * bookColors.length)] })
                    );
                    book.position.set(-0.35 + i * 0.14, row * 0.6 + 0.25, 0);
                    book.castShadow = true;
                    shelfGroup.add(book);
                }
            }
            
            shelfGroup.position.set(x, 0, z);
            return shelfGroup;
        }
        
        // Whiteboard
        function createWhiteboard(x, z, rotation) {
            rotation = rotation || 0;
            const wbGroup = new THREE.Group();
            
            const frame = new THREE.Mesh(
                new THREE.BoxGeometry(2.5, 1.5, 0.08),
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );
            frame.position.y = 2.5;
            frame.castShadow = true;
            wbGroup.add(frame);
            
            const board = new THREE.Mesh(
                new THREE.BoxGeometry(2.3, 1.3, 0.05),
                new THREE.MeshStandardMaterial({ color: 0xffffff })
            );
            board.position.set(0, 2.5, 0.02);
            wbGroup.add(board);
            
            const stickerColors = [0xffeb3b, 0x4caf50, 0x2196f3, 0xff9800, 0xe91e63];
            for (let i = 0; i < 8; i++) {
                const sticker = new THREE.Mesh(
                    new THREE.BoxGeometry(0.2, 0.2, 0.02),
                    new THREE.MeshStandardMaterial({ color: stickerColors[i % stickerColors.length] })
                );
                sticker.position.set(-0.8 + (i % 4) * 0.4, 2.2 + Math.floor(i / 4) * 0.4, 0.05);
                wbGroup.add(sticker);
            }
            
            wbGroup.position.set(x, 0, z);
            wbGroup.rotation.y = rotation;
            return wbGroup;
        }
        
        // ყავის სადგური
        function createCoffeeStation(x, z) {
            const stationGroup = new THREE.Group();
            
            const table = new THREE.Mesh(
                new THREE.BoxGeometry(1.5, 0.08, 0.8),
                new THREE.MeshStandardMaterial({ map: woodTexture })
            );
            table.position.y = 0.9;
            table.castShadow = true;
            stationGroup.add(table);
            
            const legMat = new THREE.MeshStandardMaterial({ color: 0x8b7355 });
            const legGeo = new THREE.BoxGeometry(0.08, 0.9, 0.08);
            var positions = [[-0.65, 0.45, -0.3], [0.65, 0.45, -0.3], [-0.65, 0.45, 0.3], [0.65, 0.45, 0.3]];
            positions.forEach(function(pos) {
                const leg = new THREE.Mesh(legGeo, legMat);
                leg.position.set(pos[0], pos[1], pos[2]);
                leg.castShadow = true;
                stationGroup.add(leg);
            });
            
            const coffee = new THREE.Mesh(
                new THREE.BoxGeometry(0.4, 0.5, 0.3),
                new THREE.MeshStandardMaterial({ color: 0x222222 })
            );
            coffee.position.set(-0.3, 1.2, 0);
            coffee.castShadow = true;
            stationGroup.add(coffee);
            
            for (let i = 0; i < 3; i++) {
                const cup = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.05, 0.04, 0.1, 16),
                    new THREE.MeshStandardMaterial({ color: 0xffffff })
                );
                cup.position.set(0.2 + i * 0.15, 0.99, 0);
                stationGroup.add(cup);
            }
            
            stationGroup.position.set(x, 0, z);
            return stationGroup;
        }
        
        // მცენარე
        function createPlant(x, z, scale) {
            scale = scale || 1;
            const plantGroup = new THREE.Group();
            
            const pot = new THREE.Mesh(
                new THREE.CylinderGeometry(0.2 * scale, 0.15 * scale, 0.3 * scale, 16),
                new THREE.MeshStandardMaterial({ color: 0x8b4513 })
            );
            pot.position.y = 0.15 * scale;
            pot.castShadow = true;
            plantGroup.add(pot);
            
            for (let i = 0; i < 5; i++) {
                const leaf = new THREE.Mesh(
                    new THREE.SphereGeometry(0.25 * scale, 8, 8),
                    new THREE.MeshStandardMaterial({ color: 0x4caf50 })
                );
                leaf.position.set(
                    (Math.random() - 0.5) * 0.3 * scale,
                    0.4 * scale + i * 0.15 * scale,
                    (Math.random() - 0.5) * 0.3 * scale
                );
                leaf.castShadow = true;
                plantGroup.add(leaf);
            }
            
            plantGroup.position.set(x, 0, z);
            return plantGroup;
        }
        
        // იატაკის ნათურა
        function createFloorLamp(x, z) {
            const lampGroup = new THREE.Group();
            
            const base = new THREE.Mesh(
                new THREE.CylinderGeometry(0.2, 0.25, 0.1, 16),
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );
            base.position.y = 0.05;
            lampGroup.add(base);
            
            const pole = new THREE.Mesh(
                new THREE.CylinderGeometry(0.03, 0.03, 2.5),
                new THREE.MeshStandardMaterial({ color: 0x8b7355 })
            );
            pole.position.y = 1.3;
            lampGroup.add(pole);
            
            const shade = new THREE.Mesh(
                new THREE.CylinderGeometry(0.3, 0.4, 0.4, 16),
                new THREE.MeshStandardMaterial({ 
                    color: 0xfff8dc,
                    emissive: 0xfff0dd,
                    emissiveIntensity: 0.5,
                    transparent: true,
                    opacity: 0.9
                })
            );
            shade.position.y = 2.6;
            lampGroup.add(shade);
            
            const lampLight = new THREE.PointLight(0xfff0dd, 0.5, 5);
            lampLight.position.y = 2.5;
            lampGroup.add(lampLight);
            
            lampGroup.position.set(x, 0, z);
            return lampGroup;
        }
        
        // აგენტის შექმნა - CylinderGeometry-ით (CapsuleGeometry-ის ნაცვლად!)
        function createAgent(color, name) {
            const agentGroup = new THREE.Group();
            
            // სხეული
            const bodyGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.6, 16);
            const bodyMat = new THREE.MeshStandardMaterial({ 
                color: color,
                roughness: 0.5,
                metalness: 0.3
            });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.6;
            body.castShadow = true;
            agentGroup.add(body);
            
            // სხეულის ზედა ნახევარსფერო
            const topCap = new THREE.Mesh(
                new THREE.SphereGeometry(0.2, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2),
                bodyMat
            );
            topCap.position.y = 0.9;
            topCap.castShadow = true;
            agentGroup.add(topCap);
            
            // სხეულის ქვედა ნახევარსფერო
            const bottomCap = new THREE.Mesh(
                new THREE.SphereGeometry(0.2, 16, 8, 0, Math.PI * 2, Math.PI / 2, Math.PI / 2),
                bodyMat
            );
            bottomCap.position.y = 0.3;
            bottomCap.castShadow = true;
            agentGroup.add(bottomCap);
            
            // თავი
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.22, 16, 16),
                new THREE.MeshStandardMaterial({ color: color, roughness: 0.5, metalness: 0.3 })
            );
            head.position.y = 1.25;
            head.castShadow = true;
            agentGroup.add(head);
            
            // თვალები
            const eyeMat = new THREE.MeshStandardMaterial({ 
                color: 0xffffff,
                emissive: 0xffffff,
                emissiveIntensity: 1
            });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), eyeMat);
            leftEye.position.set(-0.08, 1.27, 0.18);
            agentGroup.add(leftEye);
            
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), eyeMat);
            rightEye.position.set(0.08, 1.27, 0.18);
            agentGroup.add(rightEye);
            
            // ხელები
            const armMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.5, metalness: 0.3 });
            const leftArm = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.4, 8), armMat);
            leftArm.position.set(-0.28, 0.6, 0);
            leftArm.rotation.z = 0.2;
            leftArm.castShadow = true;
            agentGroup.add(leftArm);
            
            const rightArm = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.4, 8), armMat);
            rightArm.position.set(0.28, 0.6, 0);
            rightArm.rotation.z = -0.2;
            rightArm.castShadow = true;
            agentGroup.add(rightArm);
            
            // ფეხები
            const leftLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.3, 8), armMat);
            leftLeg.position.set(-0.1, 0.15, 0);
            leftLeg.castShadow = true;
            agentGroup.add(leftLeg);
            
            const rightLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.3, 8), armMat);
            rightLeg.position.set(0.1, 0.15, 0);
            rightLeg.castShadow = true;
            agentGroup.add(rightLeg);
            
            agentGroup.userData = { name: name, color: color };
            return agentGroup;
        }
        
        // სცენის აწყობა
        scene.add(createRoom());
        
        const deskPositions = [
            { x: -4, z: -3, rot: 0 },
            { x: 0, z: -3, rot: 0 },
            { x: 4, z: -3, rot: 0 },
            { x: -4, z: 2, rot: 0 },
            { x: 4, z: 2, rot: 0 }
        ];
        
        const desks = [];
        deskPositions.forEach(function(pos, i) {
            const desk = createDesk(pos.x, pos.z, pos.rot);
            scene.add(desk);
            desks.push({ mesh: desk, position: new THREE.Vector3(pos.x, 0, pos.z), id: i });
        });
        
        scene.add(createBookshelf(-6.5, -4));
        scene.add(createWhiteboard(0, -5.8));
        scene.add(createCoffeeStation(6, -4));
        scene.add(createPlant(-6, 4, 1.5));
        scene.add(createPlant(6, 4, 1.2));
        scene.add(createPlant(-6, -4, 1));
        scene.add(createFloorLamp(-6, 3));
        
        // აგენტები
        const agents = [
            { name: 'კოპირაითერი 1', color: 0x9c27b0, state: 'idle', desk: null, mesh: null, targetPos: null },
            { name: 'კოპირაითერი 2', color: 0x2196f3, state: 'idle', desk: null, mesh: null, targetPos: null },
            { name: 'რედაქტორი', color: 0xff9800, state: 'idle', desk: null, mesh: null, targetPos: null },
            { name: 'SEO სპეციალისტი', color: 0x4caf50, state: 'idle', desk: null, mesh: null, targetPos: null }
        ];
        
        agents.forEach(function(agent, i) {
            const mesh = createAgent(agent.color, agent.name);
            mesh.position.set(-6 + i * 1.5, 0, 4.5);
            scene.add(mesh);
            agent.mesh = mesh;
        });
        
        // მოძრაობის სისტემა
        function moveAgentToDesk(agent, desk) {
            agent.state = 'walking';
            agent.desk = desk;
            agent.targetPos = new THREE.Vector3(desk.position.x, 0, desk.position.z + 1.2);
        }
        
        function updateAgentMovement(agent, delta) {
            if (agent.state !== 'walking' || !agent.targetPos) return;
            
            const currentPos = agent.mesh.position;
            const direction = new THREE.Vector3().subVectors(agent.targetPos, currentPos);
            const distance = direction.length();
            
            if (distance < 0.15) {
                agent.state = 'working';
                agent.mesh.position.y = 0.3;
                updateUI();
                return;
            }
            
            direction.normalize();
            const speed = 2.5 * delta;
            currentPos.x += direction.x * speed;
            currentPos.z += direction.z * speed;
            
            agent.mesh.rotation.y = Math.atan2(direction.x, direction.z);
            agent.mesh.position.y = Math.abs(Math.sin(Date.now() * 0.01)) * 0.05;
        }
        
        // ამოცანების სისტემა
        let taskCount = 0;
        
        function assignRandomTask() {
            const idleAgents = agents.filter(function(a) { return a.state === 'idle'; });
            if (idleAgents.length === 0) return;
            
            const availableDesks = desks.filter(function(d) { 
                return !agents.some(function(a) { return a.desk === d; }); 
            });
            if (availableDesks.length === 0) return;
            
            const agent = idleAgents[Math.floor(Math.random() * idleAgents.length)];
            const desk = availableDesks[Math.floor(Math.random() * availableDesks.length)];
            
            moveAgentToDesk(agent, desk);
            taskCount++;
            updateUI();
        }
        
        function makeAllWork() {
            agents.forEach(function(agent) {
                if (agent.state === 'idle') {
                    const availableDesks = desks.filter(function(d) { 
                        return !agents.some(function(a) { return a.desk === d; }); 
                    });
                    if (availableDesks.length > 0) {
                        const desk = availableDesks[0];
                        moveAgentToDesk(agent, desk);
                        taskCount++;
                    }
                }
            });
            updateUI();
        }
        
        function resetAgents() {
            agents.forEach(function(agent, i) {
                agent.state = 'idle';
                agent.desk = null;
                agent.targetPos = null;
                agent.mesh.position.set(-6 + i * 1.5, 0, 4.5);
                agent.mesh.position.y = 0;
            });
            taskCount = 0;
            updateUI();
        }
        
        // UI განახლება
        function updateUI() {
            const list = document.getElementById('agentList');
            list.innerHTML = '';
            
            const statusText = {
                'idle': '🟢 თავისუფალი',
                'walking': '🚶 მიდის მაგიდასთან',
                'working': ' მუშაობს'
            };
            
            agents.forEach(function(agent) {
                const card = document.createElement('div');
                card.className = 'agent-card';
                const colorHex = agent.color.toString(16);
                const paddedColor = colorHex.length < 6 ? '0'.repeat(6 - colorHex.length) + colorHex : colorHex;
                card.innerHTML = '<div class="name" style="color: #' + paddedColor + '">' + agent.name + '</div>' +
                    '<div class="status ' + agent.state + '">' + statusText[agent.state] + '</div>';
                card.onclick = function() { if (agent.state === 'idle') assignRandomTask(); };
                list.appendChild(card);
            });
            
            document.getElementById('statActive').textContent = agents.filter(function(a) { return a.state === 'working'; }).length;
            document.getElementById('statIdle').textContent = agents.filter(function(a) { return a.state === 'idle'; }).length;
            document.getElementById('statTasks').textContent = taskCount;
        }
        
        // ანიმაცია
        const clock = new THREE.Clock();
        let cameraAngle = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            agents.forEach(function(agent) { updateAgentMovement(agent, delta); });
            
            cameraAngle += 0.0003;
            camera.position.x = Math.cos(cameraAngle) * 18;
            camera.position.z = Math.sin(cameraAngle) * 18;
            camera.position.y = 12 + Math.sin(cameraAngle * 0.5) * 2;
            camera.lookAt(0, 1, 0);
            
            renderer.render(scene, camera);
        }
        
        window.addEventListener('resize', function() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // სტარტი
        console.log('✓ ყველაფერი მზადაა');
        document.getElementById('loading').classList.add('hidden');
        updateUI();
        animate();
    </script>
</body>
</html>
