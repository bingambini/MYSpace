<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tails - 3D Character</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
        }
        #canvas-container { 
            width: 100vw; 
            height: 100vh; 
        }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 1.5em;
            z-index: 1000;
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 30px 50px;
            border-radius: 15px;
        }
        .loading.hidden { display: none; }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 14, 39, 0.9);
            border: 1px solid rgba(100, 181, 246, 0.3);
            border-radius: 15px;
            padding: 15px 25px;
            color: #fff;
            z-index: 100;
            text-align: center;
        }
        .info p { font-size: 0.9em; margin: 5px 0; }
        
        .title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 14, 39, 0.9);
            border: 1px solid rgba(100, 181, 246, 0.3);
            border-radius: 15px;
            padding: 15px 30px;
            color: #fff;
            z-index: 100;
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="loading" id="loading">იტვირთება Tails...</div>
    
    <div class="title">🦊 Tails - 3D Character</div>
    
    <div class="info">
        <p>🖱️ მარცხენა ღილაკი - ტრიალება</p>
        <p>🔍 Scroll - Zoom</p>
        <p>➡️ მარჯვენა ღილაკი - გადაადგილება</p>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- GLTFLoader -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <!-- OrbitControls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        // სცენა
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        
        // კამერა
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3, 2, 3);
        
        // რენდერი
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        // OrbitControls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 1;
        controls.maxDistance = 20;
        
        // განათება
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);
        
        const pointLight1 = new THREE.PointLight(0xfff0dd, 0.5, 10);
        pointLight1.position.set(-3, 3, -3);
        scene.add(pointLight1);
        
        const pointLight2 = new THREE.PointLight(0xfff0dd, 0.5, 10);
        pointLight2.position.set(3, 3, 3);
        scene.add(pointLight2);
        
        // იატაკი
        const floorGeo = new THREE.CircleGeometry(5, 32);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = 0;
        floor.receiveShadow = true;
        scene.add(floor);
        
        // GLB მოდელის ჩატვირთვა
        const loader = new THREE.GLTFLoader();
        
        loader.load(
            'tails_movie_roblox_no_rig.glb',
            function(gltf) {
                const model = gltf.scene;
                
                // მოდელის ზომის და ცენტრის გამოთვლა
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                
                console.log('მოდელის ზომა:', size);
                console.log('მოდელის ცენტრი:', center);
                
                // მოდელის ცენტრირება
                model.position.x -= center.x;
                model.position.y -= center.y;
                model.position.z -= center.z;
                
                // მასშტაბის რეგულირება
                const maxDim = Math.max(size.x, size.y, size.z);
                const targetSize = 2;
                const scale = targetSize / maxDim;
                model.scale.set(scale, scale, scale);
                
                // მოდელის განთავსება იატაკზე
                const newBox = new THREE.Box3().setFromObject(model);
                model.position.y -= newBox.min.y;
                
                scene.add(model);
                
                // ჩრდილების ჩართვა
                model.traverse(function(child) {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                
                // კამერის პოზიცია
                camera.position.set(3, 2, 3);
                camera.lookAt(0, 1, 0);
                controls.target.set(0, 1, 0);
                controls.update();
                
                document.getElementById('loading').classList.add('hidden');
                console.log('✓ Tails ჩაიტვირთა!');
            },
            function(xhr) {
                if (xhr.lengthComputable) {
                    const percent = (xhr.loaded / xhr.total * 100).toFixed(0);
                    document.getElementById('loading').textContent = 'იტვირთება... ' + percent + '%';
                }
            },
            function(error) {
                console.error('შეცდომა:', error);
                document.getElementById('loading').textContent = '❌ შეცდომა: ' + error.message;
            }
        );
        
        // ანიმაცია
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        // ზომის ცვლილება
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
